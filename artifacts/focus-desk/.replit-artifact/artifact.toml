kind = "web"
previewPath = "/"
title = "FocusDesk"
version = "1.0.0"
id = "artifacts/focus-desk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20072

[services.development]
run = "pnpm --filter @workspace/focus-desk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/focus-desk", "run", "build" ]
publicDir = "artifacts/focus-desk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20072"
BASE_PATH = "/"
